<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Scout⚽">
<meta name="theme-color" content="#060d16">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<title>Scout Over PRO</title>
<style>
/* ═══ BASE — iOS Safari safe ═══════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060d16;--bg2:#0a1825;--bg3:#0f1e2e;
  --blue:#00aaff;--green:#00ff88;--yel:#ffcc00;
  --red:#ff4466;--gold:#ffd700;--white:#e0f0ff;
  --gray:#3a6a8f;--border:#0e2035;
}
html{background:var(--bg)}
body{
  font-family:'Outfit',sans-serif;
  color:var(--white);
  background:var(--bg);
  /* padding-bottom lascia spazio alla navbar fissa */
  padding-bottom:calc(72px + env(safe-area-inset-bottom));
  padding-top:env(safe-area-inset-top);
}

/* ═══ TOP BAR — sticky scroll normale ══════════════════════════════ */
#topbar{
  position:sticky;top:0;z-index:50;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:12px 14px 10px;
}
.tbrow1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:900;
  background:linear-gradient(120deg,var(--blue),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.liveinfo{display:flex;align-items:center;gap:6px}
#ldot{width:7px;height:7px;border-radius:50%;background:#334;flex-shrink:0;
  transition:background .3s}
#livelbl{font-size:10px;color:var(--gray)}
.keyrow{display:flex;gap:8px;margin-bottom:10px}
#keyinput{flex:1;background:var(--bg3);border:1px solid #1a3a5a;border-radius:10px;
  padding:10px 12px;color:var(--white);font-size:12px;outline:none;
  font-family:'JetBrains Mono',monospace;-webkit-appearance:none}
#keyinput:focus{border-color:var(--yel)}
#keyinput::placeholder{color:#1a3a5a}
.savebtn{background:rgba(255,204,0,.12);border:1px solid rgba(255,204,0,.4);
  border-radius:10px;padding:10px 12px;color:var(--yel);font-size:12px;
  font-weight:700;cursor:pointer}
#refreshbtn{width:100%;padding:13px;border-radius:12px;
  background:linear-gradient(135deg,#0044aa,#0088ff);
  border:1px solid #0066cc;color:#fff;font-size:14px;font-weight:800;
  cursor:pointer;text-transform:uppercase;letter-spacing:.5px;
  box-shadow:0 4px 20px rgba(0,136,255,.25);
  display:flex;align-items:center;justify-content:center;gap:8px}
#refreshbtn:disabled{background:#0a2040;border-color:#1a4a7f;box-shadow:none;cursor:not-allowed}
#refreshbtn:active:not(:disabled){opacity:.85}
.spin{width:14px;height:14px;border:2px solid #1a4a7f;
  border-top-color:var(--blue);border-radius:50%;
  animation:spin .8s linear infinite;display:inline-block;flex-shrink:0}

/* ═══ LIVE BAR ══════════════════════════════════════════════════════ */
#livebar{display:none;margin-top:8px;background:rgba(255,68,102,.07);
  border:1px solid rgba(255,68,102,.2);border-radius:10px;padding:8px 12px}
.lbrow{display:flex;align-items:center;justify-content:space-between}
.lbt{font-size:11px;color:var(--red);font-weight:700}
.lbsub{font-size:10px;color:var(--gray)}
#lbcd{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--yel);font-weight:700}
#pbtn{background:rgba(255,204,0,.1);border:1px solid rgba(255,204,0,.3);
  border-radius:8px;padding:5px 10px;color:var(--yel);font-size:11px;font-weight:700;cursor:pointer}
#lbres{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}
.lbsc{font-size:10px;padding:2px 8px;border-radius:6px;
  background:rgba(0,0,0,.3);border:1px solid var(--border);
  color:var(--white);font-family:'JetBrains Mono',monospace}
.lbsc.ll{border-color:var(--red);color:var(--red)}

/* ═══ LOG ════════════════════════════════════════════════════════════ */
#logbox{display:none;margin-top:6px;padding:8px 10px;
  background:rgba(0,0,0,.4);border-radius:8px;border:1px solid var(--border)}
.logline{font-size:10px;color:#1a4a7f;margin-bottom:1px;
  font-family:'JetBrains Mono',monospace}
.logline.active{color:var(--blue)}

/* ═══ MAIN CONTENT ══════════════════════════════════════════════════ */
#main{padding:14px 14px 20px;min-height:60vh}

/* ═══ BOTTOM NAV — fixed bottom ═════════════════════════════════════ */
#botnav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom);
}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 0;background:none;border:none;color:var(--gray);
  font-family:'Outfit',sans-serif;cursor:pointer}
.nb.nba{color:var(--blue)}
.ni{font-size:20px}
.nl{font-size:10px;font-weight:600}

/* ═══ HOME ══════════════════════════════════════════════════════════ */
.banner{background:linear-gradient(135deg,rgba(0,170,255,.1),rgba(0,255,136,.07));
  border:1px solid rgba(0,170,255,.3);border-radius:14px;padding:14px;margin-bottom:14px}
.bant{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:6px}
.bans{font-size:11px;color:var(--gray);line-height:1.8}
.bandis{margin-top:10px;width:100%;padding:8px;border-radius:8px;
  background:rgba(0,170,255,.1);border:1px solid rgba(0,170,255,.3);
  color:var(--blue);font-size:11px;cursor:pointer;display:block}
.hero{text-align:center;padding:16px 0 12px;margin-bottom:16px;
  border-bottom:1px solid var(--border)}
.htitle{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:900;
  background:linear-gradient(120deg,var(--blue),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hsub{font-size:10px;color:var(--gray);margin-top:4px}
.hdate{font-size:10px;color:#1a4a7f;margin-top:3px}
.idle{text-align:center;padding:24px 0}
.idlet{font-size:16px;font-weight:700;color:var(--blue);margin-bottom:8px}
.idled{font-size:13px;color:#2a5a7f;line-height:1.7}
.progwrap{height:4px;background:#0a1825;border-radius:2px;overflow:hidden;margin-bottom:4px}
.progbar{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));
  border-radius:2px;transition:width .5s ease}
.proglbl{font-size:11px;color:var(--gray);text-align:center;margin-bottom:12px}
.sumrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sumpill{background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer}
.sumpill.son{background:rgba(var(--cc,0,170,255),.15);border-color:var(--cc,#00aaff)}
.sumn{font-size:20px;font-weight:900;font-family:'JetBrains Mono',monospace}
.suml{font-size:9px;color:var(--gray);text-transform:uppercase}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;font-size:11px;padding:6px 12px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:20px;color:var(--gray);cursor:pointer}
.chip.on{background:rgba(0,170,255,.15);border-color:#00aaff;color:#00aaff}
.chip.on[style*="--cc"]{background:rgba(0,170,255,.15);border-color:var(--cc)}
.lghdr{display:flex;align-items:center;gap:6px;padding:8px 0 4px;
  border-top:1px solid #080f18;margin-top:6px}
.lgname{flex:1;font-size:11px;font-weight:700;color:var(--blue)}
.lgcnt{font-size:10px;color:var(--gray);background:#0a1825;
  padding:2px 7px;border-radius:10px}
.mrow{display:flex;align-items:center;gap:8px;padding:8px 0;
  border-bottom:1px solid #080f18}
.mtime{font-size:10px;color:var(--gray);font-family:'JetBrains Mono',monospace;min-width:36px}
.mteams{flex:1;font-size:12px;color:var(--white);overflow:hidden;
  white-space:nowrap;text-overflow:ellipsis}
.mvs{color:#1a3a5a;font-size:9px;margin:0 4px}
.mconf{font-size:10px;font-weight:700;min-width:42px;text-align:right}
.gotobtn{width:100%;padding:15px;margin-top:18px;border-radius:14px;
  background:linear-gradient(135deg,rgba(0,255,136,.1),rgba(0,170,255,.08));
  border:1px solid rgba(0,255,136,.3);color:var(--green);
  font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px}

/* ═══ BADGE PUNTEGGIO ════════════════════════════════════════════════ */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;
  border-radius:20px;font-size:10px;font-weight:800;
  font-family:'JetBrains Mono',monospace;white-space:nowrap;margin-left:auto}
.bns{background:rgba(0,170,255,.07);border:1px solid rgba(0,170,255,.2);color:#2a5a7f}
.bft{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);color:var(--green)}
.bht{background:rgba(255,204,0,.1);border:1px solid rgba(255,204,0,.3);color:var(--yel)}
.blive{background:rgba(255,68,102,.15);border:1px solid rgba(255,68,102,.4);color:var(--red)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--red);
  animation:pulse 1.2s ease-in-out infinite;flex-shrink:0}

/* ═══ CARDS ANALISI ══════════════════════════════════════════════════ */
.card{border-radius:14px;margin-bottom:10px;overflow:hidden;
  animation:fadeUp .3s ease both}
.chead{padding:12px 14px;cursor:pointer}
.cmeta{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.ctag{font-size:9px;color:#2a5a7f;background:#0a1825;padding:2px 8px;
  border-radius:20px;white-space:nowrap;max-width:130px;
  overflow:hidden;text-overflow:ellipsis}
.ctime{font-size:10px;color:#2a5a7f}
.cteams{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ct{font-size:13px;font-weight:700;color:var(--white);flex:1}
.cvs{font-size:9px;color:#1a3a5a;padding:0 6px}
.cmkts{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.mkl{font-size:9px;color:#2a5a7f}
.mkv{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace}
.bar{height:4px;background:#0a1825;border-radius:2px;overflow:hidden;margin-top:2px}
.barf{height:100%;border-radius:2px;transition:width .9s ease}
.chev{text-align:center;font-size:9px;color:#1a3050;padding-bottom:5px;cursor:pointer}
.detail{padding:0 14px 14px;border-top:1px solid var(--border);display:none}
.detail.open{display:block}

/* Live result box */
.lrbox{background:rgba(255,68,102,.07);border:1px solid rgba(255,68,102,.25);
  border-radius:12px;padding:12px 14px;margin:12px 0 10px}
.lrt{font-size:10px;color:var(--red);font-weight:700;
  text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.lrs{font-size:32px;font-weight:900;font-family:'JetBrains Mono',monospace;
  text-align:center;margin-bottom:4px}
.lrm{display:flex;justify-content:space-between;font-size:10px;color:var(--gray)}
.levs{margin-top:8px;max-height:80px;overflow-y:auto}
.ev{font-size:10px;color:var(--gray);padding:2px 0;border-bottom:1px solid #080f18}
.ev:last-child{border-bottom:none}
.ev.gol{color:var(--green);font-weight:700}
.lra{display:flex;align-items:center;gap:6px;margin-top:6px;
  font-size:10px;color:#2a5a7f}
.adot{width:6px;height:6px;border-radius:50%;background:var(--blue);
  animation:pulse 2s ease-in-out infinite;flex-shrink:0}

/* Odds box */
.odbox{background:rgba(0,0,0,.25);border:1px solid rgba(255,204,0,.15);
  border-radius:10px;padding:10px 12px;margin-bottom:10px}

/* Stats grid */
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin:10px 0}
.sbox{background:rgba(0,0,0,.3);border-radius:8px;padding:7px 10px}
.sl{font-size:9px;color:#2a5a7f;margin-bottom:2px}
.sv{font-size:13px;font-weight:800;font-family:'JetBrains Mono',monospace}
.flags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.flag{font-size:10px;padding:2px 8px;border-radius:20px}
.nota{font-size:11px;color:var(--gray);font-style:italic;
  border-left:2px solid #1a3a5a;padding-left:8px;margin-bottom:10px}

/* Esiti */
.esbox{background:rgba(0,0,0,.2);border-radius:10px;padding:10px 12px;margin-top:6px}
.estit{font-size:10px;color:#2a5a7f;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.esgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.esl{font-size:9px;color:#3a6a8f;margin-bottom:3px;text-align:center}
.esbtns{display:flex;gap:2px}
.ebtn{flex:1;padding:6px 0;border-radius:5px;font-size:10px;font-weight:700;
  cursor:pointer;border:1px solid #1a3a5a;background:transparent;color:#3a6a8f}
.ebtn.sV{border-color:var(--green);background:rgba(0,204,102,.2);color:var(--green)}
.ebtn.sP{border-color:var(--red);background:rgba(255,68,102,.2);color:var(--red)}
.ebtn.sN{border-color:#556;background:rgba(80,100,120,.2);color:#556}

/* Vuoto / errore */
.empty{text-align:center;padding:40px 16px}
.emptyt{font-size:16px;font-weight:700;color:var(--blue);margin-bottom:8px}
.emptyd{font-size:13px;color:#2a5a7f;line-height:1.7;margin-bottom:20px}
.homebtn{padding:14px 28px;border-radius:12px;
  background:linear-gradient(135deg,#0044aa,#0088ff);
  border:1px solid #0066cc;color:white;font-size:14px;font-weight:700;cursor:pointer}
.errbox{background:rgba(255,68,102,.08);border:1px solid rgba(255,68,102,.3);
  border-radius:14px;padding:20px;margin-bottom:16px;text-align:center}
.errt{color:var(--red);font-weight:700;margin-bottom:6px;font-size:15px}
.errm{color:#7a9bbf;font-size:12px;line-height:1.5}

/* ═══ STATS ══════════════════════════════════════════════════════════ */
.stsec{background:rgba(0,255,136,.05);border:1px solid rgba(0,255,136,.2);
  border-radius:14px;padding:16px;margin-bottom:14px}
.sstit,.ssectit{font-size:11px;font-weight:700;color:var(--green);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.ssectit{color:var(--blue)}
.stgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.stbox{background:rgba(0,0,0,.3);border-radius:10px;padding:10px 8px;text-align:center}
.stn{font-size:22px;font-weight:900;font-family:'JetBrains Mono',monospace}
.stl{font-size:10px;color:#2a5a7f}
.sthr{font-size:24px;font-weight:900;font-family:'JetBrains Mono',monospace;
  text-align:center;margin-top:8px}
.slbl{font-size:11px;color:#2a5a7f;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.smktg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.smkt{background:rgba(0,0,0,.25);border:1px solid var(--border);
  border-radius:12px;padding:10px 12px}
.smktn{font-size:11px;font-weight:700;margin-bottom:5px}
.smktr{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.smkth{font-size:18px;font-weight:900;font-family:'JetBrains Mono',monospace}
.sfrow{display:flex;align-items:center;gap:8px;padding:9px 12px;
  background:rgba(0,0,0,.2);border-radius:10px;margin-bottom:6px}

/* ═══ SETTINGS ═══════════════════════════════════════════════════════ */
.ssec{background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:14px;padding:14px;margin-bottom:14px}
.setrow{display:flex;align-items:center;gap:10px;padding:10px 0;
  border-bottom:1px solid #080f18}
.setrow:last-child{border-bottom:none}
.setlbl{flex:1;font-size:13px;color:var(--white)}
.setval{font-size:12px;color:var(--blue);font-family:'JetBrains Mono',monospace}
.ltrow{display:flex;align-items:center;gap:8px;padding:7px 0;
  border-bottom:1px solid #080f18}
.ltrow:last-child{border-bottom:none}
.tog{width:36px;height:20px;border-radius:10px;position:relative;
  cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.ton{background:var(--green);box-shadow:0 0 8px rgba(0,255,136,.4)}
.toff{background:#1e3a5f}
.tog::after{content:'';position:absolute;top:3px;left:3px;
  width:14px;height:14px;border-radius:50%;background:white;transition:left .2s}
.ton::after{left:19px}

/* Export */
.expbtn{width:100%;padding:13px;margin-top:12px;border-radius:12px;
  background:linear-gradient(135deg,#003a1a,#005a28);
  border:1px solid var(--green);color:var(--green);
  font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.5px}

/* ═══ ANIMATIONS ══════════════════════════════════════════════════ */

/* ═══ VOLUME SCOMMESSE ═══════════════════════════════════════════ */
.volbar{margin:8px 0 0;padding:9px 11px;background:rgba(255,204,0,.04);
  border:1px solid rgba(255,204,0,.15);border-radius:10px}
.voltop{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.vollbl{font-size:9px;color:#3a6a8f;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.volpct{font-size:11px;font-weight:800;font-family:'JetBrains Mono',monospace}
.voltrack{height:5px;background:#0a1825;border-radius:3px;overflow:hidden;margin-bottom:4px}
.volfill{height:100%;border-radius:3px;transition:width .9s ease}
.voltag{font-size:9px;font-weight:700}

.gal-home{background:rgba(255,68,102,.07);border:1px solid rgba(255,68,102,.25);
  border-radius:14px;padding:12px;margin-top:14px;margin-bottom:10px}
.gal-title{font-size:11px;font-weight:700;color:#ff4466;
  text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;
  animation:pulse 1.2s ease-in-out infinite}
.gal-row{display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px;background:rgba(0,0,0,.3);border-radius:10px;
  margin-bottom:6px;cursor:pointer;border:1px solid transparent}
.gal-row:last-child{margin-bottom:0}
.gal-teams{font-size:12px;font-weight:600;color:#e0f0ff;flex:1}

.vlchip{font-size:9px;padding:2px 7px;border-radius:10px;background:rgba(0,0,0,.3);
  border:1px solid transparent;white-space:nowrap}


/* ═══ GOAL PRESSURE INDEX ═══════════════════════════════════════ */
.gpibox{
  margin:10px 0;padding:12px;border-radius:12px;
  border:1px solid rgba(255,68,102,.2);
  background:rgba(255,68,102,.05);
}
.gpitop{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.gpitit{font-size:10px;font-weight:700;color:#ff8800;text-transform:uppercase;letter-spacing:.5px}
.gpival{font-size:20px;font-weight:900;font-family:'JetBrains Mono',monospace}
.gpitrack{height:6px;background:#0a1825;border-radius:3px;overflow:hidden;margin-bottom:5px}
.gpifill{height:100%;border-radius:3px;transition:width 1s ease}
.gpilvl{font-size:10px;font-weight:700;margin-bottom:6px}
.gpifactors{display:flex;flex-direction:column;gap:3px;margin-top:6px;
  padding-top:6px;border-top:1px solid #0a1825}
.gpif{display:flex;justify-content:space-between;font-size:10px;color:#3a6a8f;
  padding:2px 0}

/* Alert banner animazione */
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}

/* ═══ ODDS / BETFAIR VOLUME ══════════════════════════════════════ */
.odbox{background:rgba(0,0,0,.25);border:1px solid rgba(255,204,0,.2);
  border-radius:12px;padding:12px 14px;margin-bottom:10px}
.odtit{font-size:10px;font-weight:700;color:#ffcc00;text-transform:uppercase;
  letter-spacing:1px;margin-bottom:10px}
.odgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.oditem{background:rgba(0,0,0,.3);border-radius:8px;padding:8px;
  border:1px solid #0e2035}
.oditem.odon{border-color:rgba(255,204,0,.3)}
.odlbl{font-size:9px;color:#2a5a7f;margin-bottom:3px}
.odval{font-size:18px;font-weight:900;font-family:'JetBrains Mono',monospace}
.odbar{height:3px;background:#0a1825;border-radius:2px;overflow:hidden;margin:4px 0}
.odfill{height:100%;border-radius:2px}
.odinfo{font-size:9px;font-weight:700;margin-top:2px}

/* Volume bar nella card */
.volbar{margin:8px 0 0;padding:9px 11px;background:rgba(255,204,0,.04);
  border:1px solid rgba(255,204,0,.15);border-radius:10px}
.voltop{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.vollbl{font-size:9px;color:#3a6a8f;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.volpct{font-size:11px;font-weight:800;font-family:'JetBrains Mono',monospace}
.voltrack{height:5px;background:#0a1825;border-radius:3px;overflow:hidden;margin-bottom:4px}
.volfill{height:100%;border-radius:3px;transition:width .9s ease}
.voltag{font-size:9px;font-weight:700}

.gal-home{background:rgba(255,68,102,.07);border:1px solid rgba(255,68,102,.25);
  border-radius:14px;padding:12px;margin-top:14px;margin-bottom:10px}
.gal-title{font-size:11px;font-weight:700;color:#ff4466;
  text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;
  animation:pulse 1.2s ease-in-out infinite}
.gal-row{display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px;background:rgba(0,0,0,.3);border-radius:10px;
  margin-bottom:6px;cursor:pointer;border:1px solid transparent}
.gal-row:last-child{margin-bottom:0}
.gal-teams{font-size:12px;font-weight:600;color:#e0f0ff;flex:1}

.vlchip{font-size:9px;padding:2px 7px;border-radius:10px;background:rgba(0,0,0,.3);
  border:1px solid transparent;white-space:nowrap}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<!-- TOP BAR sticky -->
<div id="topbar">
  <div class="tbrow1">
    <span class="logo">⚽ SCOUT OVER PRO</span>
    <div class="liveinfo">
      <span id="ldot"></span>
      <span id="livelbl"></span>
    </div>
  </div>
  <div class="keyrow">
    <input type="text" id="keyinput" placeholder="API Key (api-football.com)..."
      autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="savebtn" onclick="saveKey()">💾</button>
  </div>
  <button id="refreshbtn" onclick="fetchMatches()">🔄 AGGIORNA ORA</button>
  <div id="livebar">
    <div class="lbrow">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="dot" style="background:var(--red)"></span>
        <div><div class="lbt">LIVE</div><div class="lbsub" id="lbsub">In attesa...</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="lbcd"></span>
        <button id="pbtn" onclick="toggleAuto()">⏸</button>
      </div>
    </div>
    <div id="lbres"></div>
  </div>
  <div id="logbox"></div>
</div>

<!-- MAIN CONTENT — scorre normalmente con il body -->
<div id="main"></div>

<!-- BOTTOM NAV fixed -->
<div id="botnav">
  <button class="nb nba" data-page="home" onclick="nav('home')">
    <span class="ni">🏠</span><span class="nl">Home</span>
  </button>
  <button class="nb" data-page="analisi" onclick="nav('analisi')">
    <span class="ni">📊</span><span class="nl">Analisi</span>
  </button>
  <button class="nb" data-page="stats" onclick="nav('stats')">
    <span class="ni">📈</span><span class="nl">Stats</span>
  </button>
  <button class="nb" data-page="settings" onclick="nav('settings')">
    <span class="ni">⚙️</span><span class="nl">Config</span>
  </button>
</div>

<script src="app.js"></script>
</body>
</html>
