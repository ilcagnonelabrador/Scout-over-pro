<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Scout⚽">
<meta name="theme-color" content="#00aaff">
<meta name="description" content="Analisi IPC calcio — Over 0.5PT, 0.5F, 1.5F, 2.5F con dati reali">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<title>Scout Over PRO</title>
<style>
:root {
  --bg:#060d16; --bg2:#0a1825; --bg3:#0f1e2e;
  --blue:#00aaff; --green:#00ff88; --yel:#ffcc00;
  --red:#ff4466; --org:#ff8800; --gold:#ffd700;
  --white:#e0f0ff; --gray:#3a6a8f; --dark:#1a3a5a;
  --border:#0e2035;
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Outfit',sans-serif;color:var(--white);display:flex;flex-direction:column;}

/* ── LAYOUT ── */
#app-shell{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);}
#top-bar{
  background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);
  border-bottom:1px solid var(--border);
  padding:12px 14px 10px;
  flex-shrink:0;
}
#scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
#bottom-nav{
  background:var(--bg2);border-top:1px solid var(--border);
  padding:10px 0 calc(10px + var(--safe-bot));
  display:flex;flex-shrink:0;
}

/* ── TOP BAR ── */
.tb-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.tb-logo{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:900;
  background:linear-gradient(120deg,var(--blue),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tb-date{font-size:10px;color:var(--gray);}
.tb-key-row{display:flex;gap:8px;margin-bottom:10px;}
#api-key-input{
  flex:1;background:var(--bg3);border:1px solid var(--dark);
  border-radius:10px;padding:9px 12px;color:var(--white);
  font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;
  -webkit-appearance:none;
}
#api-key-input:focus{border-color:var(--yel);}
#api-key-input::placeholder{color:#1a3a5a;}
.save-btn{
  background:rgba(255,204,0,0.12);border:1px solid rgba(255,204,0,0.4);
  border-radius:10px;padding:9px 12px;color:var(--yel);
  font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;
  font-family:'Outfit',sans-serif;
}
#refresh-btn{
  width:100%;padding:13px 0;border-radius:12px;
  background:linear-gradient(135deg,#0044aa,#0088ff);
  border:1px solid #0066cc;color:#fff;
  font-size:14px;font-weight:800;cursor:pointer;
  letter-spacing:0.5px;text-transform:uppercase;
  box-shadow:0 4px 20px rgba(0,136,255,0.25);
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:'Outfit',sans-serif;transition:all 0.2s;
}
#refresh-btn:disabled{background:linear-gradient(135deg,#0a2040,#0a3060);border-color:#1a4a7f;box-shadow:none;}
#refresh-btn:active:not(:disabled){transform:scale(0.98);}
.spinner{width:14px;height:14px;border:2px solid #1a4a7f;border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;}

/* ── LOG ── */
#log-box{margin-top:6px;padding:8px 10px;background:rgba(0,0,0,0.4);border-radius:8px;border:1px solid var(--border);display:none;}
.log-line{font-size:10px;color:#1a4a7f;margin-bottom:1px;font-family:'JetBrains Mono',monospace;}
.log-line.active{color:var(--blue);}

/* ── BOTTOM NAV ── */
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;background:none;border:none;color:var(--gray);font-family:'Outfit',sans-serif;}
.nav-btn.active{color:var(--blue);}
.nav-icon{font-size:20px;}
.nav-label{font-size:10px;font-weight:600;}

/* ── CONTENT ── */
.page{padding:14px 14px 20px;display:none;}
.page.active{display:block;}

/* ── INSTALL BANNER ── */
#install-banner{
  background:linear-gradient(135deg,rgba(0,170,255,0.12),rgba(0,255,136,0.08));
  border:1px solid rgba(0,170,255,0.3);border-radius:14px;
  padding:14px;margin-bottom:14px;
}
.install-title{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:6px;}
.install-steps{font-size:11px;color:var(--gray);line-height:1.8;}
.install-steps b{color:var(--white);}
#dismiss-install{
  margin-top:10px;width:100%;padding:8px;border-radius:8px;
  background:rgba(0,170,255,0.1);border:1px solid rgba(0,170,255,0.3);
  color:var(--blue);font-size:11px;cursor:pointer;font-family:'Outfit',sans-serif;
}

/* ── FILTER BAR ── */
.filter-scroll{overflow-x:auto;display:flex;gap:6px;padding-bottom:4px;margin-bottom:10px;}
.filter-scroll::-webkit-scrollbar{display:none;}
.pill{white-space:nowrap;font-size:11px;padding:6px 12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:20px;color:var(--gray);cursor:pointer;font-family:'Outfit',sans-serif;}
.pill.p-blue{background:rgba(0,170,255,0.15);border-color:var(--blue);color:var(--blue);}
.pill.p-green{background:rgba(0,255,136,0.15);border-color:var(--green);color:var(--green);}
.pill.p-yel{background:rgba(255,204,0,0.15);border-color:var(--yel);color:var(--yel);}
.pill.p-red{background:rgba(255,68,102,0.15);border-color:var(--red);color:var(--red);}

/* ── SUMMARY PILLS ── */
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px;}
.sum-pill{border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,0.03);}
.sum-num{font-size:18px;font-weight:900;font-family:'JetBrains Mono',monospace;}
.sum-lbl{font-size:9px;color:var(--gray);text-transform:uppercase;}

/* ── CARDS ── */
.card{border-radius:14px;margin-bottom:10px;overflow:hidden;animation:fadeUp 0.35s ease both;}
.card-head{padding:12px 14px;cursor:pointer;}
.card-meta{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.ltag{font-size:10px;color:#2a5a7f;background:#0a1825;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.ttag{font-size:10px;color:#2a5a7f;}
.ctag{margin-left:auto;font-size:11px;font-weight:800;letter-spacing:0.5px;}
.teams{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.tn{font-size:13px;font-weight:700;color:var(--white);flex:1;}
.tn.r{text-align:right;}
.vs{font-size:9px;color:#1a3a5a;padding:0 6px;font-family:monospace;}
.mkts{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.mkt-item .mrow{display:flex;justify-content:space-between;}
.mkt-item .ml{font-size:9px;color:#2a5a7f;}
.mkt-item .mv{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.hbar{height:4px;background:#0a1825;border-radius:2px;overflow:hidden;margin-top:2px;}
.hbar-f{height:100%;border-radius:2px;transition:width 0.9s ease;}
.chevron{text-align:center;font-size:9px;color:#1a3050;padding-bottom:4px;cursor:pointer;}

/* ── DETAIL ── */
.detail{padding:0 14px 14px;border-top:1px solid var(--border);display:none;}
.detail.open{display:block;}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin:12px 0 10px;}
.sb{background:rgba(0,0,0,0.3);border-radius:8px;padding:7px 10px;}
.sl{font-size:9px;color:#2a5a7f;margin-bottom:2px;}
.sv{font-size:13px;font-weight:800;font-family:'JetBrains Mono',monospace;}
.flags-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.flag{font-size:10px;padding:2px 8px;border-radius:20px;}
.note{font-size:11px;color:var(--gray);font-style:italic;border-left:2px solid #1a3a5a;padding-left:8px;margin-bottom:10px;}

/* ── ESITO ── */
.esito-box{background:rgba(0,0,0,0.2);border-radius:10px;padding:10px 12px;margin-top:6px;}
.etitle{font-size:10px;color:#2a5a7f;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;}
.eg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.emkt-l{font-size:9px;color:#3a6a8f;margin-bottom:3px;text-align:center;}
.ebtns{display:flex;gap:2px;}
.ebtn{flex:1;padding:5px 0;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;border:1px solid #1a3a5a;background:transparent;color:#3a6a8f;}
.ebtn.sV{border-color:var(--green);background:rgba(0,204,102,0.2);color:var(--green);}
.ebtn.sP{border-color:var(--red);background:rgba(255,68,102,0.2);color:var(--red);}
.ebtn.sN{border-color:#556677;background:rgba(80,100,120,0.2);color:#556677;}

/* ── STATS PAGE ── */
.sec-title{font-size:11px;color:var(--green);font-weight:700;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;}
.stat-sec{background:rgba(0,255,136,0.05);border:1px solid rgba(0,255,136,0.2);border-radius:14px;padding:16px;margin-bottom:14px;}
.glob-g{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.gb{background:rgba(0,0,0,0.3);border-radius:10px;padding:10px 8px;text-align:center;}
.gn{font-size:22px;font-weight:900;font-family:'JetBrains Mono',monospace;}
.gl{font-size:10px;color:#2a5a7f;}
.hr-big{font-size:24px;font-weight:900;font-family:'JetBrains Mono',monospace;text-align:center;margin-top:8px;}
.mkt-sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
.msb{background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:12px;padding:10px 12px;}
.msn{font-size:11px;font-weight:700;margin-bottom:5px;}
.msr{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.msh{font-size:18px;font-weight:900;font-family:'JetBrains Mono',monospace;}
.fascia{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(0,0,0,0.2);border-radius:10px;margin-bottom:6px;}
.fl{flex:1;font-size:12px;}
.fv{font-size:11px;color:var(--green);}
.fp{font-size:11px;color:var(--red);}
.fh{font-size:13px;font-weight:900;font-family:'JetBrains Mono',monospace;min-width:46px;text-align:right;}

/* ── SETTINGS ── */
.set-sec{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;}
.set-title{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.set-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #080f18;}
.set-row:last-child{border-bottom:none;}
.set-lbl{flex:1;font-size:13px;color:var(--white);}
.set-sub{font-size:10px;color:var(--gray);margin-top:2px;}
.set-val{font-size:12px;color:var(--blue);font-family:'JetBrains Mono',monospace;}
.league-toggle{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #080f18;}
.league-toggle:last-child{border-bottom:none;}
.lt-name{flex:1;font-size:12px;color:var(--white);}
.toggle{width:36px;height:20px;border-radius:10px;position:relative;cursor:pointer;transition:background 0.2s;border:none;}
.toggle.on{background:var(--green);box-shadow:0 0 8px rgba(0,255,136,0.4);}
.toggle.off{background:#1e3a5f;}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:white;transition:left 0.2s;}
.toggle.on::after{left:19px;}

/* ── ERROR / IDLE ── */
.err-box{background:rgba(255,68,102,0.08);border:1px solid rgba(255,68,102,0.3);border-radius:14px;padding:20px;margin-bottom:16px;text-align:center;}
.err-icon{font-size:28px;margin-bottom:8px;}
.err-t{color:var(--red);font-weight:700;margin-bottom:6px;}
.err-m{color:#7a9bbf;font-size:12px;line-height:1.5;}
.idle-box{text-align:center;padding:30px 16px;}
.idle-icon{font-size:52px;margin-bottom:14px;}
.idle-t{font-size:16px;font-weight:700;color:var(--blue);margin-bottom:8px;}
.idle-d{font-size:12px;color:#2a5a7f;line-height:1.7;}
.lp{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:16px;}
.li{background:rgba(0,170,255,0.05);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:10px;color:#2a5a7f;}

/* ── EXPORT BTN ── */
.exp-btn{width:100%;padding:12px 0;margin-top:10px;border-radius:12px;background:linear-gradient(135deg,#003a1a,#005a28);border:1px solid var(--green);color:var(--green);font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.5px;font-family:'Outfit',sans-serif;}
.exp-hint{font-size:10px;color:#1a3a5a;text-align:center;margin-top:5px;}

/* ── ANIMATIONS ── */
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>
<div id="app-shell">

  <!-- TOP BAR -->
  <div id="top-bar">
    <div class="tb-title-row">
      <span class="tb-logo">⚽ SCOUT OVER</span>
      <span class="tb-date" id="today-lbl"></span>
    </div>
    <div class="tb-key-row">
      <input type="text" id="api-key-input" placeholder="API Key (api-football.com)..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="save-btn" onclick="saveKey()">💾</button>
    </div>
    <button id="refresh-btn" onclick="fetchMatches()">
      🔄 AGGIORNA ORA
    </button>
    <div id="log-box"></div>
  </div>

  <!-- SCROLL AREA -->
  <div id="scroll-area">

    <!-- PAGE: PARTITE -->
    <div class="page active" id="page-partite">
      <div id="partite-content"></div>
    </div>

    <!-- PAGE: STATS -->
    <div class="page" id="page-stats">
      <div id="stats-content"></div>
    </div>

    <!-- PAGE: SETTINGS -->
    <div class="page" id="page-settings">
      <div id="settings-content"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div id="bottom-nav">
    <button class="nav-btn active" id="nav-partite" onclick="setPage('partite')">
      <span class="nav-icon">⚽</span><span class="nav-label">Partite</span>
    </button>
    <button class="nav-btn" id="nav-stats" onclick="setPage('stats')">
      <span class="nav-icon">📊</span><span class="nav-label">Statistiche</span>
    </button>
    <button class="nav-btn" id="nav-settings" onclick="setPage('settings')">
      <span class="nav-icon">⚙️</span><span class="nav-label">Impostazioni</span>
    </button>
  </div>

</div>

<script>
// ════════════════════════════════════════════════════════════
// SERVICE WORKER
// ════════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ════════════════════════════════════════════════════════════
// STATO
// ════════════════════════════════════════════════════════════
const LS = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
};

let S = {
  status:   'idle',
  matches:  [],
  esiti:    LS.get('esiti') || {},
  page:     'partite',
  mkt:      'pt',
  conf:     'all',
  error:    '',
  apiKey:   LS.get('apiKey') || '',
  leagues:  LS.get('leagues') || null,
  installDismissed: LS.get('installDismissed') || false,
};

const ALL_LEAGUES = [
  { id:135, name:'Serie A',        season:2025, on:true },
  { id:140, name:'La Liga',        season:2025, on:true },
  { id:78,  name:'Bundesliga',     season:2025, on:true },
  { id:61,  name:'Ligue 1',        season:2025, on:true },
  { id:88,  name:'Eredivisie',     season:2025, on:true },
  { id:94,  name:'Liga Portugal',  season:2025, on:true },
  { id:203, name:'Super Lig',      season:2025, on:true },
  { id:144, name:'Jupiler League', season:2025, on:true },
  { id:179, name:'Scottish Prem.', season:2025, on:true },
  { id:39,  name:'Premier League', season:2025, on:true },
  { id:45,  name:'FA Cup',         season:2025, on:true },
  { id:2,   name:'Champions Lge',  season:2025, on:true },
  { id:3,   name:'Europa League',  season:2025, on:true },
];
if (!S.leagues) S.leagues = ALL_LEAGUES;

const MKT_L = ['Ov0.5PT','Ov0.5F','Ov1.5F','Ov2.5F'];
const MKT_K = ['pt','f05','f15','f25'];
const MKT_C = ['#00aaff','#00cc66','#ffcc00','#ff4466'];

// ════════════════════════════════════════════════════════════
// IPC
// ════════════════════════════════════════════════════════════
function ipc(p, mkt) {
  if (p.veto_forma || p.veto_quota) return {ipc:0,hr:0,fok:false,veto:true};
  let ovc,ovt,mgc,mgt,h2h,sc,st,smg,sh;
  if (mkt==='pt')  [ovc,ovt,mgc,mgt,h2h,sc,st,smg,sh]=[p.ov05pt_c,p.ov05pt_t,p.mgpt_c,p.mgpt_t,p.h2h_pt,75,70,1.4,65];
  else if(mkt==='f05')[ovc,ovt,mgc,mgt,h2h,sc,st,smg,sh]=[p.ov05f_c,p.ov05f_t,p.mgf_c,p.mgf_t,p.h2h_f05,75,70,1.4,62];
  else if(mkt==='f15')[ovc,ovt,mgc,mgt,h2h,sc,st,smg,sh]=[p.ov15f_c,p.ov15f_t,p.mgf_c,p.mgf_t,p.h2h_f15,72,68,2.5,58];
  else              [ovc,ovt,mgc,mgt,h2h,sc,st,smg,sh]=[p.ov25f_c,p.ov25f_t,p.mgf_c,p.mgf_t,p.h2h_f25,68,62,3.2,52];
  let v = 0.20*mgc+0.20*mgt+0.25*(ovc/100)+0.25*(ovt/100)+0.05*(h2h/100);
  v += [p.topAttacco,(mgc+mgt)>=1.2,p.derby,p.motivazioni].filter(Boolean).length*0.03;
  const fok = ovc>=sc&&ovt>=st&&(mgc+mgt)>=smg&&h2h>=sh;
  return {ipc:Math.round(v*1000)/1000, hr:Math.min(0.97,Math.round((0.5+v*0.55+(fok?0.05:0))*1000)/1000), fok, veto:false};
}
function rating(hr,veto) {
  if (veto)     return {l:'VETO',c:'#556677',bg:'rgba(80,100,120,0.12)',br:'rgba(80,100,120,0.3)'};
  if (hr>=0.88) return {l:'ALTA',c:'#00ff88',bg:'rgba(0,255,136,0.07)',br:'rgba(0,255,136,0.35)'};
  if (hr>=0.75) return {l:'MEDIA',c:'#ffcc00',bg:'rgba(255,204,0,0.07)',br:'rgba(255,204,0,0.3)'};
  return              {l:'BASSA',c:'#ff4466',bg:'rgba(255,68,102,0.05)',br:'rgba(255,68,102,0.2)'};
}

// ════════════════════════════════════════════════════════════
// API
// ════════════════════════════════════════════════════════════
async function apiFetch(ep) {
  const r = await fetch(`https://v3.football.api-sports.io/${ep}`,{headers:{'x-rapidapi-key':S.apiKey,'x-rapidapi-host':'v3.football.api-sports.io'}});
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const j = await r.json();
  if (j.errors && Object.keys(j.errors).length) throw new Error(Object.values(j.errors).join(', '));
  return j;
}

function poissonOv(lam) { return Math.min(95,Math.max(30,Math.round((1-Math.exp(-lam))*100))); }

function buildStats(hs, as_, h2h) {
  const gfH = parseFloat(hs?.goals?.for?.average?.total) || 1.35;
  const gfA = parseFloat(as_?.goals?.for?.average?.total) || 1.35;
  const mgf_c = Math.round(gfH*100)/100, mgf_t = Math.round(gfA*100)/100;
  const mgpt_c = Math.round(gfH*0.44*100)/100, mgpt_t = Math.round(gfA*0.44*100)/100;
  let h2h_pt=62,h2h_f05=72,h2h_f15=60,h2h_f25=44;
  if (h2h?.length>0) {
    const n=h2h.length;
    h2h_pt  = Math.round(h2h.filter(m=>(m.score?.halftime?.home||0)+(m.score?.halftime?.away||0)>0).length/n*100);
    h2h_f05 = Math.round(h2h.filter(m=>(m.goals?.home||0)+(m.goals?.away||0)>0).length/n*100);
    h2h_f15 = Math.round(h2h.filter(m=>(m.goals?.home||0)+(m.goals?.away||0)>1).length/n*100);
    h2h_f25 = Math.round(h2h.filter(m=>(m.goals?.home||0)+(m.goals?.away||0)>2).length/n*100);
  }
  return {
    mgf_c,mgf_t,mgpt_c,mgpt_t,
    ov05pt_c:poissonOv(mgpt_c), ov05pt_t:poissonOv(mgpt_t),
    ov05f_c:poissonOv(mgf_c),   ov05f_t:poissonOv(mgf_t),
    ov15f_c:poissonOv(mgf_c*0.72), ov15f_t:poissonOv(mgf_t*0.72),
    ov25f_c:poissonOv(mgf_c*0.50), ov25f_t:poissonOv(mgf_t*0.50),
    h2h_pt,h2h_f05,h2h_f15,h2h_f25
  };
}

function addLog(msg) {
  const b=document.getElementById('log-box');
  b.style.display='block';
  if (b.children.length>=5) b.children[0].remove();
  const d=document.createElement('div');
  d.className='log-line';
  d.textContent=msg;
  b.appendChild(d);
  [...b.querySelectorAll('.log-line')].forEach((l,i,a)=>l.classList.toggle('active',i===a.length-1));
}

async function fetchMatches() {
  if (!S.apiKey) { alert('⚠️ Inserisci la tua API Key nelle Impostazioni o nel campo in alto!'); return; }
  const btn=document.getElementById('refresh-btn');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Ricerca...';
  S.status='loading'; S.matches=[]; S.error='';
  document.getElementById('log-box').innerHTML='';
  renderPartite();

  try {
    const today=new Date().toISOString().split('T')[0];
    addLog('📡 Connessione API-Football...');
    const fd=await apiFetch(`fixtures?date=${today}&timezone=Europe/Rome`);
    const all=fd.response||[];
    addLog(`📋 ${all.length} partite totali trovate`);

    const activeIds=S.leagues.filter(l=>l.on).map(l=>l.id);
    const filtered=all.filter(f=>activeIds.includes(f.league?.id));
    addLog(`🎯 ${filtered.length} partite nei campionati attivi`);

    if (!filtered.length) throw new Error(`Nessuna partita oggi nei campionati attivi (${all.length} totali in altre leghe).`);

    const results=[];
    for (let i=0;i<filtered.length;i++) {
      const f=filtered[i];
      const lg=S.leagues.find(l=>l.id===f.league?.id);
      const lname=lg?.name||f.league?.name||'';
      const season=lg?.season||2025;
      const hid=f.teams?.home?.id, aid=f.teams?.away?.id;
      addLog(`[${i+1}/${filtered.length}] ${f.teams?.home?.name} — ${f.teams?.away?.name}`);
      let hs=null,as_=null,h2h=[];
      try {
        const [hr,ar,h2r]=await Promise.all([
          apiFetch(`teams/statistics?league=${f.league.id}&season=${season}&team=${hid}`),
          apiFetch(`teams/statistics?league=${f.league.id}&season=${season}&team=${aid}`),
          apiFetch(`fixtures/headtohead?h2h=${hid}-${aid}&last=10`)
        ]);
        hs=hr.response; as_=ar.response;
        h2h=(h2r.response||[]).filter(m=>m.fixture?.status?.short==='FT').slice(0,8);
      } catch(_){}
      const st=buildStats(hs,as_,h2h);
      const orario=new Date(f.fixture?.date).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
      const hForm=hs?.form||''; const aForm=as_?.form||'';
      const vetoF=[...hForm.slice(-4)].filter(c=>c==='L').length>=4||[...aForm.slice(-4)].filter(c=>c==='L').length>=4;
      results.push({id:f.fixture?.id,campionato:lname,orario,casa:f.teams?.home?.name,trasferta:f.teams?.away?.name,...st,topAttacco:st.mgf_c>2.0||st.mgf_t>2.0,derby:false,motivazioni:false,veto_forma:vetoF,veto_quota:false,nota:`API-Football • ${h2h.length} H2H`});
      if (i<filtered.length-1) await new Promise(r=>setTimeout(r,130));
    }

    addLog(`✅ ${results.length} partite elaborate!`);
    S.matches=results.sort((a,b)=>a.orario.localeCompare(b.orario));
    S.status='done';
  } catch(e) { S.error=e.message; S.status='error'; addLog(`❌ ${e.message}`); }

  btn.disabled=false;
  btn.innerHTML='🔄 AGGIORNA ORA';
  renderPartite();
}

    return;
  }

  if(S.status==='idle'){
    el.innerHTML=`
      ${!S.installDismissed?`<div class="install-banner" id="install-banner">
        <div class="install-title">📲 Installa l'app sull'iPhone</div>

          2. Tocca il tasto <b>Condividi ⬆️</b> in basso<br>
          3. Scorri e tocca <b>"Aggiungi a schermata Home"</b><br>
          4. Tocca <b>Aggiungi</b> — l'app appare come icona!
        </div>
        <button id="dismiss-install" onclick="dismissInstall()">✓ Ho capito</button>
      </div>`:''}
      <div class="idle-box">
        <div class="idle-icon">⚽</div>
        <div class="idle-t">Scout Over PRO</div>
        <div class="idle-d">
          Inserisci la tua <b style="color:#ffcc00">API Key gratuita</b> nel campo in alto<br>
          poi premi <b style="color:#00aaff">AGGIORNA ORA</b><br><br>
          <span style="font-size:10px;color:#1a4060">🔑 Registrati gratis su api-football.com<br>100 richieste/giorno • nessuna carta di credito</span>
        </div>
        <div class="lp">${S.leagues.filter(l=>l.on).map(l=>`<div class="li">⚽ ${l.name}</div>`).join('')}</div>
      </div>`;
    return;
  }

  // PARTITE
  const sorted=[...S.matches].sort((a,b)=>ipc(b,S.mkt).hr-ipc(a,S.mkt).hr);
  const filt=sorted.filter(p=>{
    const r=ipc(p,S.mkt);
    if(S.conf==='alta')  return !r.veto&&r.hr>=0.88;
    if(S.conf==='media') return !r.veto&&r.hr>=0.75&&r.hr<0.88;
    if(S.conf==='bassa') return !r.veto&&r.hr<0.75;
    if(S.conf==='veto')  return r.veto;
    return true;
  });
  const sum={
    alta: S.matches.filter(p=>{const r=ipc(p,S.mkt);return !r.veto&&r.hr>=0.88;}).length,
    media:S.matches.filter(p=>{const r=ipc(p,S.mkt);return !r.veto&&r.hr>=0.75&&r.hr<0.88;}).length,
    bassa:S.matches.filter(p=>{const r=ipc(p,S.mkt);return !r.veto&&r.hr<0.75;}).length,
    veto: S.matches.filter(p=>ipc(p,S.mkt).veto).length,
  };

  let h='';

  // Filtri mercato
  h+='<div class="filter-scroll">';
  MKT_K.forEach((k,i)=>{
    const cls=S.mkt===k?`pill p-${['blue','green','yel','red'][i]}`:'pill';
    h+=`<button class="${cls}" onclick="setMkt('${k}')">${MKT_L[i]}</button>`;
  });
  h+='</div>';

  // Summary
  h+='<div class="sum-grid">';
  [['all','Tutte','#00aaff',S.matches.length],['alta','Alta','#00ff88',sum.alta],
   ['media','Med','#ffcc00',sum.media],['veto','Veto','#556677',sum.veto]].forEach(([k,l,c,n])=>{
    const a=S.conf===k;
    h+=`<div class="sum-pill" onclick="setConf('${k}')" style="border-color:${a?c:'#0e2035'};background:${a?c+'18':'rgba(255,255,255,0.03)'}">
      <div class="sum-num" style="color:${c}">${n}</div><div class="sum-lbl">${l}</div></div>`;
  });
  h+='</div>';

  // Cards
  filt.forEach((p,idx)=>{
    const mkts=MKT_K.map(k=>ipc(p,k));
    const best=mkts.reduce((a,b)=>a.hr>b.hr?a:b);
    const rt=rating(best.hr,best.veto);
    h+=`<div class="card" style="background:${rt.bg};border:1px solid ${rt.br};animation-delay:${idx*0.04}s">
      <div class="card-head" onclick="toggleCard(${p.id})">
        <div class="card-meta">
          <span class="ltag">${p.campionato}</span>
          <span class="ttag">${p.orario}</span>
          <span class="ctag" style="color:${rt.c}">${rt.l} ${best.veto?'':((best.hr*100).toFixed(0)+'%')}</span>
        </div>
        <div class="teams">
          <span class="tn">${p.casa}</span>
          <span class="vs">VS</span>
          <span class="tn r">${p.trasferta}</span>
        </div>
        <div class="mkts">`;
    MKT_K.forEach((k,i)=>{
      const r=ipc(p,k);
      const col=r.veto?'#334':r.hr>=0.88?MKT_C[i]:r.hr>=0.75?'#ffcc00':'#ff4466';
      const pct=r.veto?0:r.hr*100;
      h+=`<div class="mkt-item"><div class="mrow"><span class="ml">${MKT_L[i]}</span><span class="mv" style="color:${col}">${r.veto?'✗':pct.toFixed(0)+'%'}</span></div>
        <div class="hbar"><div class="hbar-f" style="width:${pct}%;background:${col};box-shadow:0 0 5px ${col}"></div></div></div>`;
    });
    h+=`</div></div>
      <div class="detail" id="det-${p.id}">
        <div class="sg">
          ${[['Over PT C',`${p.ov05pt_c}%`,p.ov05pt_c>=75],['Over PT T',`${p.ov05pt_t}%`,p.ov05pt_t>=70],
             ['Gol PT',(p.mgpt_c+p.mgpt_t).toFixed(2),(p.mgpt_c+p.mgpt_t)>=1.4],['H2H PT',`${p.h2h_pt}%`,p.h2h_pt>=65],
             ['Gol FIN',(p.mgf_c+p.mgf_t).toFixed(2),(p.mgf_c+p.mgf_t)>=2.5],['H2H 1.5F',`${p.h2h_f15}%`,p.h2h_f15>=58]
           ].map(([l,v,ok])=>`<div class="sb"><div class="sl">${l}</div><div class="sv" style="color:${ok?'#00cc66':'#ff6688'}">${v}</div></div>`).join('')}
        </div>
        <div class="flags-row">
          ${p.topAttacco?'<span class="flag" style="color:#00cc66;background:rgba(0,204,102,0.1);border:1px solid rgba(0,204,102,0.25)">⚡ Top Att.</span>':''}
          ${p.derby?'<span class="flag" style="color:#ffcc00;background:rgba(255,204,0,0.1);border:1px solid rgba(255,204,0,0.25)">🏆 Derby</span>':''}
          ${p.veto_forma?'<span class="flag" style="color:#ff4466;background:rgba(255,68,102,0.1);border:1px solid rgba(255,68,102,0.25)">🚫 Veto</span>':''}
        </div>
        <div class="note">${p.nota}</div>
        <div class="esito-box">
          <div class="etitle">📝 Esito reale (dopo la partita)</div>
          <div class="eg">
            ${MKT_K.map((k,i)=>`<div>

          </div>
        </div>
      </div>
      <div class="chevron" id="chv-${p.id}" onclick="toggleCard(${p.id})">▼</div>
    </div>`;
  });

  if (!filt.length) h+='<div style="text-align:center;padding:30px;color:#1a4060">Nessuna partita in questa categoria</div>';

  h+=`<button class="exp-btn" onclick="exportCSV()">⬇️ ESPORTA CSV</button>
      <div class="exp-hint">Importa in Google Sheets / Template Excel</div>`;

  el.innerHTML=h;
}

function renderStats() {
  const st={pt:{V:0,P:0,N:0},f05:{V:0,P:0,N:0},f15:{V:0,P:0,N:0},f25:{V:0,P:0,N:0}};
  const cf={alta:{V:0,P:0},media:{V:0,P:0},bassa:{V:0,P:0}};
  Object.entries(S.esiti).forEach(([key,val])=>{
    const [id,mkt]=key.split('_'); if(!st[mkt]) return;
    st[mkt][val]=(st[mkt][val]||0)+1;
    const m=S.matches.find(p=>String(p.id)===id);
    if(m&&(val==='V'||val==='P')){const r=ipc(m,mkt);if(!r.veto){const b=r.hr>=0.88?'alta':r.hr>=0.75?'media':'bassa';cf[b][val]++;}}
  });
  const tV=MKT_K.reduce((s,k)=>s+(st[k].V||0),0);
  const tP=MKT_K.reduce((s,k)=>s+(st[k].P||0),0);
  const tG=tV+tP;

  let h=`<div class="stat-sec">
    <div class="sec-title">📊 Globale</div>
    <div class="glob-g">
      <div class="gb"><div class="gn" style="color:#00aaff">${tG}</div><div class="gl">Giocate</div></div>
      <div class="gb"><div class="gn" style="color:#00cc66">${tV}</div><div class="gl">Vinte ✓</div></div>
      <div class="gb"><div class="gn" style="color:#ff4466">${tP}</div><div class="gl">Perse ✗</div></div>
    </div>
    <div class="hr-big" style="color:${tG>0?(tV/tG>=0.75?'#00ff88':'#ff4466'):'#2a5a7f'}">
      ${tG>0?(tV/tG*100).toFixed(1)+'%':'—'}
      <span style="font-size:11px;color:#2a5a7f"> Hit Rate</span>
    </div>
  </div>
  <div style="font-size:11px;color:#2a5a7f;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Per Mercato</div>
  <div class="mkt-sg">`;

  MKT_K.forEach((k,i)=>{
    const s=st[k]; const g=(s.V||0)+(s.P||0);
    const hr=g>0?((s.V||0)/g*100).toFixed(1):null;
    h+=`<div class="msb"><div class="msn" style="color:${MKT_C[i]}">${MKT_L[i]}</div>
      <div class="msr"><span style="color:#00cc66">V:${s.V||0}</span><span style="color:#ff4466">P:${s.P||0}</span><span style="color:#556677">N:${s.N||0}</span></div>
      <div class="msh" style="color:${hr?(parseFloat(hr)>=75?'#00ff88':'#ff4466'):'#2a5a7f'}">${hr?hr+'%':'—'}</div>
      ${g>0?`<div class="hbar" style="margin-top:6px"><div class="hbar-f" style="width:${(s.V||0)/g*100}%;background:${MKT_C[i]};box-shadow:0 0 5px ${MKT_C[i]}"></div></div>`:''}
    </div>`;
  });

  h+=`</div><div style="font-size:11px;color:#2a5a7f;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Per Fascia</div>`;
  [['🟢 Alta ≥88%','alta','#00ff88'],['🟡 Media 75-87%','media','#ffcc00'],['🔴 Bassa <75%','bassa','#ff4466']].forEach(([l,k,c])=>{
    const s=cf[k]; const g=s.V+s.P;
    const hr=g>0?(s.V/g*100).toFixed(1):null;
    h+=`<div class="fascia" style="border:1px solid ${c}22">
      <span class="fl" style="color:${c}">${l}</span>
      <span class="fv">V:${s.V}</span><span class="fp">P:${s.P}</span>
      <span class="fh" style="color:${hr?(parseFloat(hr)>=75?'#00ff88':'#ff4466'):'#2a5a7f'}">${hr?hr+'%':'—'}</span>
    </div>`;
  });

  document.getElementById('stats-content').innerHTML=h;
}

      <div class="set-title">ℹ️ Info App</div>
      <div class="set-row"><div class="set-lbl">Versione</div><div class="set-val">1.0.0</div></div>
      <div class="set-row"><div class="set-lbl">Dati da</div><div class="set-val">API-Football</div></div>
      <div class="set-row"><div class="set-lbl"><div>Formula</div><div class="set-sub">IPC + Poisson</div></div><div class="set-val">v1.0</div></div>
    </div>`;
}

function toggleLeague(i) {
  S.leagues[i].on = !S.leagues[i].on;
  LS.set('leagues', S.leagues);
  renderSettings();
}
function clearEsiti() {
  if (!confirm('Cancellare tutti gli esiti storici? Azione irreversibile.')) return;
  S.esiti={}; LS.set('esiti',{});
  renderSettings();
}
function saveKeyFromSettings() {
  const k=document.getElementById('new-key-inp')?.value?.trim();
  if (!k) { alert('Inserisci una API Key valida'); return; }
  S.apiKey=k; LS.set('apiKey',k);
  document.getElementById('api-key-input').value=k;
  alert('✅ API Key salvata!');
  renderSettings();
}
function saveKey() {
  const k=document.getElementById('api-key-input').value.trim();
  if (!k) return;
  S.apiKey=k; LS.set('apiKey',k);
  const b=document.querySelector('.save-btn');
  b.textContent='✅'; b.style.color='#00cc66'; b.style.borderColor='#00cc66';
  setTimeout(()=>{b.textContent='💾';b.style.color='';b.style.borderColor='';},2000);
}
function dismissInstall() { S.installDismissed=true; LS.set('installDismissed',true); renderPartite(); }

// ════════════════════════════════════════════════════════════
// EXPORT CSV
// ════════════════════════════════════════════════════════════
function exportCSV() {
  const rows=[['Data','Camp.','Ora','Casa','Trasferta','IPC_PT','HR_PT%','IPC_05F','HR_05F%','IPC_15F','HR_15F%','IPC_25F','HR_25F%','Esito_PT','Esito_05F','Esito_15F','Esito_25F']];
  const td=new Date().toLocaleDateString('it-IT');
  S.matches.forEach(p=>{
    const r=MKT_K.map(k=>ipc(p,k));
    rows.push([td,p.campionato,p.orario,p.casa,p.trasferta,
      r[0].ipc,(r[0].hr*100).toFixed(1),r[1].ipc,(r[1].hr*100).toFixed(1),
      r[2].ipc,(r[2].hr*100).toFixed(1),r[3].ipc,(r[3].hr*100).toFixed(1),
      S.esiti[`${p.id}_pt`]||'',S.esiti[`${p.id}_f05`]||'',S.esiti[`${p.id}_f15`]||'',S.esiti[`${p.id}_f25`]||'']);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`Scout_${td.replace(/\//g,'-')}.csv`;
  a.click();
}
